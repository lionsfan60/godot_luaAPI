name: luaAPI Android (Godot 4.2 / arm64)
on:
  workflow_dispatch:

jobs:
  android-arm64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install SCons
        run: pip install scons
      - name: Build luaAPI (android, template_release, arm64)
        working-directory: ./scripts
        run: |
          export ANDROID_NDK_ROOT="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          echo "Using NDK: $ANDROID_NDK_ROOT"
          scons platform=android target=template_release arch=arm64 production=yes extra_suffix=luaAPI
      - name: Collect .so files
        if: always()
        run: |
          mkdir -p out
          find "$GITHUB_WORKSPACE" -name '*.so' | grep -i android | tee found.txt || true
          while read f; do [ -n "$f" ] && cp "$f" out/ 2>/dev/null || true; done < found.txt
          echo "--- collected ---"; ls -la out || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: luaapi-android-arm64
          path: out/*
          if-no-files-found: warn
