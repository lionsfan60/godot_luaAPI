name: luaAPI Android GDExtension (Godot 4.2 / arm64)
on:
  workflow_dispatch:

jobs:
  android-arm64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install SCons
        run: pip install scons
      - name: Compile GDExtension (android, template_release, arm64)
        run: |
          export ANDROID_NDK_ROOT="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          echo "NDK: $ANDROID_NDK_ROOT"
          scons target=template_release platform=android arch=arm64
          echo "=== bin output ==="; ls -l project/addons/luaAPI/bin/ || true
      - name: Collect .so
        if: always()
        run: |
          mkdir -p out
          find . -path "*addons/luaAPI/bin/*" -name "*.so" -exec cp {} out/ \; 2>/dev/null || true
          find . -name "libluaapi*android*.so" -exec cp {} out/ \; 2>/dev/null || true
          echo "--- collected ---"; ls -la out || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: luaapi-gdext-android-arm64
          path: out/*
          if-no-files-found: warn
